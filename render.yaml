# Blueprint do Render para o WORKER de disparo (Baileys).
# O worker é o que roda 24/7 e segura a sessão do WhatsApp — por isso precisa
# de instância paga (a free hiberna) e disco persistente (senão perde a sessão
# a cada deploy). Ver worker/deploy/RENDER.md para o passo a passo e ressalvas.
services:
  - type: web
    name: robo-worker
    runtime: node
    rootDir: worker
    plan: starter            # NÃO use "free": ela hiberna e derruba a sessão do WhatsApp
    buildCommand: npm ci
    startCommand: node src/index.js
    healthCheckPath: /health
    disk:
      name: robo-data        # guarda a sessão do WhatsApp + SQLite (persiste entre deploys)
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: WORKER_DATA_DIR
        value: /var/data     # aponta a sessão/SQLite para o disco persistente
      - key: WORKER_API_TOKEN
        generateValue: true  # token forte gerado pelo Render (o painel usa no header)
      - key: WA_PAIR_PHONE
        sync: false          # 1 chip: número do pareamento (ex.: 5511999999999)
      - key: WA_NUMBERS
        sync: false          # 2+ chips: lista separada por vírgula (ex.: 5511111,5522222). Se preenchido, ignora WA_PAIR_PHONE.
      - key: WA_DAILY_LIMIT
        value: "60"            # por chip (2 chips = 120/dia). Ver faixas de risco no .env.example
      - key: WA_WARMUP_RAMP
        value: "15,25,40,55"   # aquecimento gradual nos primeiros dias
      - key: WA_MIN_DELAY_SEC
        value: "30"
      - key: WA_MAX_DELAY_SEC
        value: "90"
      # ── Atendente (Zapien que vende Zapien) ──────────────────────────────
      # URL pública do atendente — cole após o serviço robo-atendente subir
      # (ex.: https://robo-atendente.onrender.com). Vazio = worker só dispara.
      - key: ATTENDANT_URL
        sync: false
      # Segredo que o worker envia ao encaminhar respostas. O atendente usa o
      # MESMO valor (referenciado abaixo via fromService).
      - key: ATTENDANT_TOKEN
        generateValue: true

  # PAINEL (Next) — a interface web de busca de leads e disparo. Não segura
  # sessão de WhatsApp, então pode ficar na free (hiberna quando ocioso e
  # acorda ao abrir). Suba para "starter" se quiser sem cold-start.
  - type: web
    name: robo-painel
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Login obrigatório do painel privado de prospecção.
      - key: PANEL_ADMIN_EMAIL
        sync: false
      - key: PANEL_ADMIN_PASSWORD
        sync: false
      - key: PANEL_SESSION_SECRET
        generateValue: true
      # Token compartilhado automaticamente com o worker (não precisa copiar).
      - key: WORKER_API_TOKEN
        fromService:
          type: web
          name: robo-worker
          envVarKey: WORKER_API_TOKEN
      # URL pública do worker — cole após o worker subir (ex.: https://robo-worker.onrender.com).
      - key: WORKER_URL
        sync: false
      # URL pública do atendente — o painel mostra um card com status + "Abrir
      # dashboard". Cole após o robo-atendente subir (ex.: https://robo-atendente.onrender.com).
      - key: ATTENDANT_URL
        sync: false
      # Chaves das fontes/canais — você preenche no painel do Render.
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_BUSINESS_ID
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ATENDENTE — a cópia do Zapien que vende Zapien no número do disparo.
  # Modo gateway: NÃO fala com a Meta; recebe as respostas do worker (/inbound)
  # e responde pelo mesmo chip (/send do worker). Segura conversas/dashboard em
  # SQLite próprio → precisa de instância paga + disco (a free hiberna/perde).
  - type: web
    name: robo-atendente
    runtime: node
    rootDir: atendente
    plan: starter
    buildCommand: npm ci
    startCommand: node src/server.js
    disk:
      name: atendente-data     # SQLite do atendente — próprio, separado do Zapien de produção
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GATEWAY_MODE
        value: "1"
      - key: DATABASE_PATH
        value: /var/data/atendente.db   # banco PRÓPRIO deste número
      # Segredos PRÓPRIOS (não reaproveitar de produção) — o Render gera.
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # HERDA do Zapien: pode ser a MESMA chave Anthropic. Você preenche.
      - key: ANTHROPIC_API_KEY
        sync: false
      # URL pública deste atendente (para os links internos). Cole após subir.
      - key: APP_URL
        sync: false
      # Conta admin do painel do atendente (para você logar e assumir conversa).
      - key: ADMIN_EMAIL
        sync: false
      # OAuth do Google Calendar (mesmo projeto Google usado pelo Zapien).
      # Redirect URI: https://SEU_ATENDENTE/api/google-calendar/oauth/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ── Ligação com o worker ─────────────────────────────────────────────
      # URL pública do worker — cole após o worker subir.
      - key: WORKER_URL
        sync: false
      # Token do worker e segredo do inbound — compartilhados automaticamente.
      - key: WORKER_API_TOKEN
        fromService:
          type: web
          name: robo-worker
          envVarKey: WORKER_API_TOKEN
      - key: ATTENDANT_TOKEN
        fromService:
          type: web
          name: robo-worker
          envVarKey: ATTENDANT_TOKEN
      # Tenant fixo que vende Zapien (rode scripts/seed-zapien-tenant.mjs e cole
      # o TENANT_ID). Vazio = usa o único tenant existente.
      - key: ATTENDANT_TENANT_ID
        sync: false
